<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote V3 - Atelier Tufting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #111; color: #eee; font-family: system-ui; padding: 10px; margin: 0; text-align: center; }
        .group { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #333; }
        .label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { background: #333; color: white; border: none; padding: 15px 5px; border-radius: 10px; font-weight: 600; font-size: 13px; }
        button:active { background: #444; }
        .active { background: #007bff !important; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 240px; margin: 10px auto; }
        .btn-ctrl { background: #333; font-size: 20px; aspect-ratio: 1; border-radius: 50%; }
        .btn-img { background: #28a745; width: 100%; padding: 20px; border-radius: 12px; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="group">
        <span class="label">Disposition du Mur</span>
        <button id="l4" style="width:100%; margin-bottom:8px" onclick="setLayout('4-small', 'l4')">4 PETITS (40cm)</button>
        <button id="l12" style="width:100%; margin-bottom:8px" onclick="setLayout('1-med-2-small', 'l12')">1 MOYEN + 2 PETITS</button>
        <button id="lxl" style="width:100%" onclick="setLayout('1-xl', 'lxl')">1 XXL (150cm)</button>
    </div>

    <div class="group">
        <span class="label">Position de la Table</span>
        <input type="range" min="0" max="80" value="20" style="width:100%" oninput="updateTable(this.value)">
    </div>

    <div class="group">
        <span class="label">Sélection Cadre</span>
        <div class="grid">
            <button id="z1" class="active" onclick="setZone(1)">Z1</button>
            <button id="z2" onclick="setZone(2)">Z2</button>
            <button id="z3" onclick="setZone(3)">Z3</button>
            <button id="z4" onclick="setZone(4)">Z4</button>
        </div>
    </div>

    <div class="d-pad">
        <div></div><button class="btn-ctrl" onclick="move(0,-2)">↑</button><div></div>
        <button class="btn-ctrl" onclick="move(-2,0)">←</button>
        <button class="btn-ctrl" style="font-size:10px" onclick="reset()">RESET</button>
        <button class="btn-ctrl" onclick="move(2,0)">→</button>
        <button class="btn-ctrl" onclick="zoom(0.9)">-</button>
        <button class="btn-ctrl" onclick="move(0,2)">↓</button>
        <button class="btn-ctrl" onclick="zoom(1.1)">+</button>
    </div>

    <button class="btn-img" onclick="changeImage()">CHOISIR IMAGE</button>

<script>
    const SUPABASE_URL = 'https://hpjopidxmkgsswwkqkzr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwam9waWR4bWtnc3N3d2txa3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDY4MTIsImV4cCI6MjA5MTQyMjgxMn0.H2Olo613-fsMhJL8Nta6-YdVgMlJapovrVHXwzzZnPs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentZone = 1;
    let state = { pos_x:50, pos_y:50, scale:300 };

    function setZone(id) {
        currentZone = id;
        document.querySelectorAll('.grid button').forEach(b => b.classList.remove('active'));
        document.getElementById('z'+id).classList.add('active');
    }

    async function move(x,y) { state.pos_x+=x; state.pos_y+=y; send(); }
    async function zoom(f) { state.scale*=f; send(); }
    async function reset() { state = {pos_x:50, pos_y:50, scale:300}; send(); }
    
    async function send() {
        await supabaseClient.from('projection_state').upsert({ zone_id:currentZone, ...state }, {onConflict:'zone_id'});
    }

    async function setLayout(l, btnId) {
        document.querySelectorAll('.group button').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
        await supabaseClient.from('app_settings').update({ current_layout: l }).eq('id', 1);
    }

    async function updateTable(val) {
        await supabaseClient.from('app_settings').update({ table_height: val }).eq('id', 1);
    }

    function changeImage() {
        const url = prompt("Lien de l'image (Notion ou Google) :");
        if(url) { state.image_url = url; send(); }
    }
</script>
</body>
</html>
