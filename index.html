<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Projecteur Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: black; margin: 0; overflow: hidden; }
        #wall { display: flex; width: 100vw; height: 100vh; position: relative; }
        #table-line { position: absolute; width: 100%; border-top: 2px solid #0033CC; z-index: 10; bottom: 20%; }
        .zone { position: relative; border-right: 1px solid #111; height: 100%; display: none; overflow: hidden; perspective: 1000px; /* Ajout de la profondeur pour la perspective 3D */ }
        .motif { position: absolute; max-width: none !important; bottom: 0; display: none; transition: transform 0.2s ease; /* Fluidité des mouvements */ }
    </style>
</head>
<body>
    <div id="table-line"></div>
    <div id="wall">
        <div class="zone" id="z1"><img id="img1" class="motif"></div>
        <div class="zone" id="z2"><img id="img2" class="motif"></div>
        <div class="zone" id="z3"><img id="img3" class="motif"></div>
        <div class="zone" id="z4"><img id="img4" class="motif"></div>
    </div>

<script>
    const SUPABASE_URL = 'https://hpjopidxmkgsswwkqkzr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwam9waWR4bWtnc3N3d2txa3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDY4MTIsImV4cCI6MjA5MTQyMjgxMn0.H2Olo613-fsMhJL8Nta6-YdVgMlJapovrVHXwzzZnPs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentTableHeight = 20;

    function updateView(d) {
        if(!d) return;
        const id = d.zone_id || d.id;
        const img = document.getElementById('img' + id);
        if(!img) return;
        if(!d.image_url || d.image_url === 'vide') { img.style.display = "none"; return; }
        
        img.src = d.image_url;
        img.style.display = "block";
        img.style.width = (d.scale || 300) + "px";
        img.style.left = (d.pos_x || 50) + "%";
        img.style.bottom = (currentTableHeight + (d.pos_y - 50)) + "%";

        // --- NOUVELLE LOGIQUE DE DÉFORMATION ---
        const rot = d.rotation || 0;
        const px = d.persp_x || 0; // Inclinaison Haut/Bas
        const py = d.persp_y || 0; // Inclinaison Gauche/Droite
        
        // On combine : 
        // 1. Centrage (-50%) 
        // 2. Flip horizontal indispensable (scaleX -1)
        // 3. Rotation
        // 4. Perspective 3D (rotateX et rotateY)
        img.style.transform = `translateX(-50%) scaleX(-1) rotate(${rot}deg) rotateX(${px}deg) rotateY(${py}deg)`;
    }

    async function applySettings(s) {
        if(!s) return;
        currentTableHeight = parseInt(s.table_height || 20);
        document.getElementById('table-line').style.bottom = currentTableHeight + "%";
        const zones = document.querySelectorAll('.zone');
        zones.forEach(z => z.style.display = 'none');
        const l = s.current_layout;
        if(l === '1-xl') { zones[0].style.display='block'; zones[0].style.width='100%'; }
        else if(l === '2-med') { zones[0].style.display='block'; zones[0].style.width='50%'; zones[1].style.display='block'; zones[1].style.width='50%'; }
        else if(l === '1-med-2-small') { zones[0].style.display='block'; zones[0].style.width='50%'; zones[1].style.display='block'; zones[1].style.width='25%'; zones[2].style.display='block'; zones[2].style.width='25%'; }
        else if(l === '4-small') { zones.forEach(z => { z.style.display='block'; z.style.width='25%'; }); }
        
        const {data} = await supabaseClient.from('projection_state').select('*');
        if(data) data.forEach(updateView);
    }

    supabaseClient.channel('any').on('postgres_changes', {event:'*', schema:'public'}, (p) => {
        if(p.table === 'app_settings') applySettings(p.new);
        if(p.table === 'projection_state') updateView(p.new);
    }).subscribe();

    async function init() {
        const {data:s} = await supabaseClient.from('app_settings').select('*').limit(1).single();
        if(s) applySettings(s);
    }
    init();
</script>
</body>
</html>
