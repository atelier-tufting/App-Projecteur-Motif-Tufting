<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Projecteur Tufting - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: black; margin: 0; overflow: hidden; }
        /* Le log est invisible maintenant, appuie sur F12 si besoin */
        #debug-log { position: absolute; top: 0; left: 0; font-size: 8px; color: rgba(255,255,255,0.2); z-index: 100; pointer-events: none; }
        #wall { display: flex; width: 100vw; height: 100vh; position: relative; }
        #table-line { position: absolute; width: 100%; border-top: 2px solid red; z-index: 10; bottom: 20%; }
        .zone { position: relative; border: 1px solid #333; height: 100%; display: none; overflow: hidden; }
        /* scaleX(-1) pour l'effet miroir indispensable au tufting */
        .motif { position: absolute; transform: translate(-50%, -50%) scaleX(-1); max-width: none !important; }
    </style>
</head>
<body>
    <div id="debug-log"></div>
    <div id="table-line"></div>
    <div id="wall">
        <div class="zone" id="z1"><img id="img1" class="motif" src=""></div>
        <div class="zone" id="z2"><img id="img2" class="motif" src=""></div>
        <div class="zone" id="z3"><img id="img3" class="motif" src=""></div>
        <div class="zone" id="z4"><img id="img4" class="motif" src=""></div>
    </div>

<script>
    const SUPABASE_URL = 'https://hpjopidxmkgsswwkqkzr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwam9waWR4bWtnc3N3d2txa3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDY4MTIsImV4cCI6MjA5MTQyMjgxMn0.H2Olo613-fsMhJL8Nta6-YdVgMlJapovrVHXwzzZnPs';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function updateView(d) {
        const id = d.zone_id || d.id;
        const img = document.getElementById('img' + id);
        if(!img) return;

        if(d.image_url && d.image_url.length > 5) {
            img.src = d.image_url;
            img.style.display = "block";
        } else {
            img.style.display = "none";
        }
        
        // On s'assure que le scale n'est pas à 0
        const size = (d.scale && d.scale > 10) ? d.scale : 300;
        img.style.width = size + "px";
        img.style.left = (d.pos_x || 50) + "%";
        img.style.top = (d.pos_y || 50) + "%";
    }

    function applySettings(s) {
        document.getElementById('table-line').style.bottom = (s.table_height || 20) + "%";
        const zones = document.querySelectorAll('.zone');
        zones.forEach(z => z.style.display = 'none');
        
        const l = s.current_layout;
        if(l === '4-small') { 
            zones.forEach(z => { z.style.display='block'; z.style.width='25%'; });
        } else if(l === '1-med-2-small') { 
            zones[0].style.display='block'; zones[0].style.width='50%'; 
            zones[1].style.display='block'; zones[1].style.width='25%'; 
            zones[2].style.display='block'; zones[2].style.width='25%'; 
        } else if(l === '1-xl') { 
            zones[0].style.display='block'; zones[0].style.width='100%'; 
        }
    }

    supabaseClient.channel('realtime-all').on('postgres_changes', { event: '*', schema: 'public' }, (p) => {
        if (p.table === 'projection_state') updateView(p.new);
        if (p.table === 'app_settings') applySettings(p.new);
    }).subscribe();

    async function init() {
        const {data:p} = await supabaseClient.from('projection_state').select('*');
        if(p) p.forEach(updateView);
        const {data:s} = await supabaseClient.from('app_settings').select('*').limit(1).single();
        if(s) applySettings(s);
    }
    init();
</script>
</body>
</html>
