<script>
    // ... Garde tes clés Supabase ...

    let currentTableHeight = 20;

    function updateView(d) {
        const id = d.zone_id;
        const img = document.getElementById('img' + id);
        if(!img) return;

        // Si Reset ou vide
        if(!d.image_url || d.image_url === 'vide') {
            img.style.display = "none";
            return;
        }

        img.src = d.image_url;
        img.style.display = "block";
        img.style.width = (d.scale || 300) + "px";
        img.style.left = (d.pos_x || 50) + "%";
        
        // --- ALIGNEMENT TABLE ---
        // L'image est ancrée en bas. 
        // Si pos_y = 50, elle touche la ligne rouge.
        const offsetY = (d.pos_y - 50);
        img.style.bottom = (currentTableHeight + offsetY) + "%";
    }

    // Fonction pour tout recalculer quand la table bouge
    async function syncAll() {
        const { data } = await supabaseClient.from('projection_state').select('*');
        if(data) data.forEach(updateView);
    }

    supabaseClient.channel('any').on('postgres_changes', {event:'*', schema:'public'}, (p) => {
        if(p.table === 'app_settings') {
            currentTableHeight = parseInt(p.new.table_height);
            document.getElementById('table-line').style.bottom = currentTableHeight + "%";
            syncAll(); // Magie : les images suivent la ligne
        }
        if(p.table === 'projection_state') updateView(p.new);
    }).subscribe();

    // Initialisation
    async function init() {
        const {data:s} = await supabaseClient.from('app_settings').select('*').limit(1).single();
        if(s) {
            currentTableHeight = s.table_height;
            document.getElementById('table-line').style.bottom = currentTableHeight + "%";
            syncAll();
        }
    }
    init();
</script>
