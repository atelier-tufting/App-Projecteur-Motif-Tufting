<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PROJO ATELIER FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; margin: 0; overflow: hidden; font-family: sans-serif; }
        #table-line { 
            position: absolute; width: 100%; border-top: 3px solid #0033CC; 
            z-index: 10; bottom: 20%; box-shadow: 0 0 15px #0033CC;
        }
        #wall { display: flex; width: 100vw; height: 100vh; position: relative; z-index: 5; }
        .zone { position: relative; border-right: 1px solid #111; height: 100%; display: none; overflow: hidden; }
        .motif { position: absolute; transform: translateX(-50%) scaleX(-1); bottom: 0; display: none; }
        /* Animation de fond très discrète */
        #bg-anim {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #080808 0%, #000 100%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="bg-anim"></div>
    <div id="table-line"></div>
    <div id="wall">
        <div class="zone" id="z1"><img id="img1" class="motif"></div>
        <div class="zone" id="z2"><img id="img2" class="motif"></div>
        <div class="zone" id="z3"><img id="img3" class="motif"></div>
        <div class="zone" id="z4"><img id="img4" class="motif"></div>
    </div>

<script>
    // --- CONFIGURATION SANS ERREUR ---
    const S_URL = 'https://hpjopidxmkgsswwkqkzr.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwam9waWR4bWtnc3N3d2txa3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NDY4MTIsImV4cCI6MjA5MTQyMjgxMn0.H2Olo613-fsMhJL8Nta6-YdVgMlJapovrVHXwzzZnPs';
    
    const supabaseClient = supabase.createClient(S_URL, S_KEY);
    let tableH = 20;

    function updateView(d) {
        const id = d.zone_id || d.id;
        const img = document.getElementById('img' + id);
        if(!img) return;
        if(!d.image_url || d.image_url === 'vide') { img.style.display = "none"; return; }
        img.src = d.image_url;
        img.style.display = "block";
        img.style.width = (d.scale || 300) + "px";
        img.style.left = (d.pos_x || 50) + "%";
        img.style.bottom = (tableH + (d.pos_y - 50)) + "%";
    }

    async function applySettings(s) {
        if(!s) return;
        tableH = parseInt(s.table_height || 20);
        document.getElementById('table-line').style.bottom = tableH + "%";
        const zones = document.querySelectorAll('.zone');
        zones.forEach(z => z.style.display = 'none');
        const l = s.current_layout;
        if(l === '1-xl') { zones[0].style.display='block'; zones[0].style.width='100%'; }
        else if(l === '2-med') { zones[0].style.display='block'; zones[0].style.width='50%'; zones[1].style.display='block'; zones[1].style.width='50%'; }
        else if(l === '1-med-2-small') { zones[0].style.display='block'; zones[0].style.width='50%'; zones[1].style.display='block'; zones[1].style.width='25%'; zones[2].style.display='block'; zones[2].style.width='25%'; }
        else if(l === '4-small') { zones.forEach(z => { z.style.display='block'; z.style.width='25%'; }); }
        const {data} = await supabaseClient.from('projection_state').select('*');
        if(data) data.forEach(updateView);
    }

    // Récupération initiale
    async function init() {
        const {data: settings} = await supabaseClient.from('app_settings').select('*').limit(1).single();
        if(settings) applySettings(settings);
    }

    // Temps réel
    supabaseClient.channel('custom-all-channel')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'app_settings' }, payload => applySettings(payload.new))
    .on('postgres_changes', { event: '*', schema: 'public', table: 'projection_state' }, payload => updateView(payload.new))
    .subscribe();

    init();
</script>
</body>
</html>
